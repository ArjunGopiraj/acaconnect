<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 842px;
      height: 595px;
      position: relative;
      font-family: Arial, sans-serif;
    }
    .background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .participant-name {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: bold;
      color: #000;
    }
    .college-name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      color: #000;
    }
    .event-name {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      font-weight: bold;
      color: #000;
    }
    .event-date {
      position: absolute;
      top: 70%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #000;
    }
  </style>
</head>
<body>
  <img src="CANVA_IMAGE_PATH" class="background" />
  <div class="content">
    <div class="participant-name">{{PARTICIPANT_NAME}}</div>
    <div class="college-name">{{COLLEGE_NAME}}</div>
    <div class="event-name">{{EVENT_NAME}}</div>
    <div class="event-date">{{EVENT_DATE}}</div>
  </div>
</body>
</html>
